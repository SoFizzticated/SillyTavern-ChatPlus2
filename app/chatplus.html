<!-- ChatPlus 2 Tab Interface -->
<div class="chatplus-tabs-container">
  <!-- Tab Navigation -->
  <div class="chatplus-tab-buttons">
    <button class="chatplus-tab-button" data-chatplus-tab="characters" title="Characters">
      <span class="chatplus-tab-icon"><i class="fa-solid fa-users" aria-hidden="true"></i></span>
      <span class="chatplus-tab-label">Characters</span>
    </button>
    <button class="chatplus-tab-button" data-chatplus-tab="recent" title="Recent">
      <span class="chatplus-tab-icon"><i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i></span>
      <span class="chatplus-tab-label">Recent</span>
    </button>
    <button class="chatplus-tab-button" data-chatplus-tab="folders" title="Folders">
      <span class="chatplus-tab-icon"><i class="fa-solid fa-folder-tree" aria-hidden="true"></i></span>
      <span class="chatplus-tab-label">Folders</span>
    </button>
    <button class="chatplus-tab-button" data-chatplus-tab="workshops" title="Workshops">
      <span class="chatplus-tab-icon"><i class="fa-solid fa-toolbox" aria-hidden="true"></i></span>
      <span class="chatplus-tab-label">Workshops</span>
    </button>
  </div>

  <!-- Tab Contents -->
  <div class="chatplus-tab-panels">
    <!-- Loading overlay (step 43g) — scoped to the tab-panels area so it
         only dims Recent/Folders content. The Characters tab content is
         empty; ST's native `.scrollableInner` lives outside this container
         and is never covered. Shown via `hidden` attribute toggle from
         CoreAPI.showLoadingOverlay() with a 150 ms delay so fast ops
         don't flash. -->
    <div id="chatplus-loading-overlay" class="chatplus-loading-overlay" role="status" aria-live="polite" aria-hidden="true" hidden>
      <div class="chatplus-loading-overlay-inner">
        <i class="fa-solid fa-spinner fa-spin chatplus-loading-overlay-icon" aria-hidden="true"></i>
        <span class="chatplus-loading-overlay-label">Loading…</span>
      </div>
    </div>
    <!-- Characters Tab — intentionally empty. ChatPlus does NOT move
         SillyTavern's DOM. When this tab is active, TabController removes
         `.chatplus-native-hidden` from `#right-nav-panel .scrollableInner`
         so ST's own character list / group chats / create form show in
         their original position. -->
    <div class="chatplus-tab-content" data-chatplus-tab="characters"></div>

    <!-- Recent Chats Tab -->
    <div class="chatplus-tab-content" data-chatplus-tab="recent">
      <div class="chatplus-recent-toolbar">
        <div class="chatplus-recent-toolbar-primary">
          <button class="menu_button chatplus-icon-btn" id="chatplus-recent-reload" title="Reload chats" aria-label="Reload chats">
            <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
          </button>
          <div class="chatplus-search-bar">
            <input type="text" id="chatplus-recent-search" class="chatplus-search-input text_pole" placeholder="Search chats..." />
            <button class="chatplus-search-clear" id="chatplus-recent-clear" title="Clear search">✕</button>
          </div>
          <!-- Edit-mode toggle is injected here by RecentChatsView at runtime -->
        </div>
        <!-- "N selected" hint + bulk toolbar are injected here by RecentChatsView when edit mode is active -->
      </div>
      <div class="chatplus-recent-list" id="chatplus-recent-list">
        <!-- Recent chats will be rendered here -->
        <div class="chatplus-placeholder">
          <p>Recent chats will appear here</p>
        </div>
      </div>
    </div>

    <!-- Folders Tab -->
    <div class="chatplus-tab-content" data-chatplus-tab="folders">
      <div class="chatplus-folders-header">
        <button class="menu_button chatplus-icon-btn" id="chatplus-new-folder" title="New folder" aria-label="New folder">
          <i class="fa-solid fa-folder-plus" aria-hidden="true"></i>
        </button>
        <div class="chatplus-search-bar">
          <input type="text" id="chatplus-folders-search" class="chatplus-search-input text_pole" placeholder="Search folders..." />
          <button class="chatplus-search-clear" id="chatplus-folders-clear" title="Clear search">✕</button>
        </div>
      </div>
      <div class="chatplus-folders-list" id="chatplus-folders-list">
        <!-- Folders will be rendered here -->
        <div class="chatplus-placeholder">
          <p>Create folders to organize your chats</p>
        </div>
      </div>
    </div>

    <!-- Workshops Tab -->
    <div class="chatplus-tab-content" data-chatplus-tab="workshops">
      <div class="chatplus-workshops-header">
        <button class="menu_button chatplus-icon-btn" id="chatplus-save-workshop" title="Save current tabs as a workshop" aria-label="Save current tabs as a workshop">
          <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
        </button>
        <span class="chatplus-workshops-hint" id="chatplus-workshops-hint">Save the tabs you have open as a named workshop</span>
      </div>
      <div class="chatplus-workshops-list" id="chatplus-workshops-list">
        <!-- Workshops will be rendered here -->
        <div class="chatplus-placeholder">
          <p>Open some tabs, then save them as a workshop</p>
        </div>
      </div>
    </div>
  </div>
</div>
